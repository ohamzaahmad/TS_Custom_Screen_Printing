<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting | TS Custom Screen Printing</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Plus Jakarta Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 560px);
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 28px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-weight: 800;
        color: #f97316;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: #475569;
      }
    </style>
    <script>
      (function () {
        var target = '/';
        if (window.location.pathname && window.location.pathname !== '/') {
          target = '/';
        }
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <main class="card" role="status" aria-live="polite">
      <span class="badge">Please wait</span>
      <h1>Redirecting to the website</h1>
      <p>If redirection does not start automatically, go to the home page.</p>
      <p><a href="/">Continue</a></p>
    </main>
  </body>
</html>
