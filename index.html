
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS Custom Screen Printing | Industrial Apparel Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      
      :root {
        --brand-purple: #BD00FF;
        --brand-orange: #FF8A00;
        --brand-dark: #0A0015;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #fcfcfc;
        color: var(--brand-dark);
      }

      .bg-grain {
        position: relative;
      }
      .bg-grain::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.015;
        z-index: 1000;
        pointer-events: none;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      }

      .text-gradient-orange {
        background: linear-gradient(to right, #BD00FF, #FF8A00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .bg-gradient-brand {
        background: linear-gradient(135deg, #BD00FF 0%, #2E005C 100%);
      }

      .nav-blur {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .glass-dark {
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      ::selection {
        background: var(--brand-purple);
        color: white;
      }

      .animate-in {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes soft-pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(189, 0, 255, 0.4); }
        70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(189, 0, 255, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(189, 0, 255, 0); }
      }
      .btn-pulse {
        animation: soft-pulse 3s infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-grain overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
